<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhisperSelf - Speech to Text</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <i data-lucide="mic" class="header-icon"></i>
          <h1>WhisperSelf</h1>
        </div>
        <div class="header-links">
          <a href="/admin.html" class="header-link">
            <i data-lucide="shield" class="link-icon"></i> Admin
          </a>
          <a href="/developer.html" class="header-link">
            <i data-lucide="code" class="link-icon"></i> API Docs
          </a>
        </div>
      </header>

      <main>
        <!-- Input Section -->
        <section class="input-section">
          <div class="input-methods">
            <!-- Upload -->
            <div class="input-method">
              <div class="upload-area" id="uploadArea">
                <i data-lucide="cloud-upload" class="upload-icon"></i>
                <h3>Upload File</h3>
                <p>Drag & drop or click</p>
                <input type="file" id="fileInput" accept="audio/*,video/*" hidden />
              </div>
              <div id="fileInfo" class="file-info hidden">
                <p id="fileName"></p>
                <p id="fileSize"></p>
              </div>
            </div>
          </div>

          <!-- Options & Submit in one row -->
          <div class="controls-row">
            <div class="options-inline">
              <select id="model" class="select-compact">
                <option value="tiny">Tiny (~1s)</option>
                <option value="base">Base (~10s)</option>
                <option selected value="small">Small (~30s)</option>
                <option value="medium">Medium (~2m)</option>
                <option value="large">Large (~10m)</option>
              </select>

              <select id="language" class="select-compact">
                <option value="auto">Auto Detect</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
                <option value="hi">Hindi</option>
                <option value="ar">Arabic</option>
              </select>

              <select id="task" class="select-compact">
                <option value="transcribe">Transcribe</option>
                <option value="translate">Translate to English</option>
              </select>
            </div>

            <button id="submitBtn" class="btn btn-success" disabled>
              <i data-lucide="play" class="btn-icon"></i> Transcribe
            </button>
          </div>

          <p id="limitInfo" class="limit-info"></p>
        </section>

        <!-- Loading Section -->
        <div id="loadingSection" class="loading-section hidden">
          <div class="spinner"></div>
          <p id="loadingText">Transcribing your audio...</p>
          <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <p id="estimatedTime" class="estimated-time"></p>
        </div>

        <!-- Results Section -->
        <section id="resultsSection" class="results-section hidden">
          <div class="results-header">
            <h3><i data-lucide="file-text" class="section-icon-small"></i> Result</h3>
            <div class="results-actions">
              <button id="copyBtn" class="btn-small">
                <i data-lucide="copy" class="btn-icon-small"></i>
              </button>
              <button id="downloadBtn" class="btn-small">
                <i data-lucide="download" class="btn-icon-small"></i>
              </button>
              <button id="newBtn" class="btn-small">
                <i data-lucide="refresh-cw" class="btn-icon-small"></i>
              </button>
            </div>
          </div>
          <div id="results" class="results"></div>
        </section>

        <!-- History Section - Collapsible -->
        <div class="history-toggle" onclick="toggleHistory()">
          <i data-lucide="history" class="history-icon"></i>
          <span>Recent Transcriptions</span>
          <i data-lucide="chevron-down" id="historyChevron" class="chevron-icon"></i>
        </div>
        <section id="historySection" class="history-section hidden">
          <div id="history" class="history-list"></div>
        </section>
      </main>

      <footer>
        <p>WhisperSelf © 2026 | <a href="/developer.html" class="footer-link">API</a></p>
      </footer>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
